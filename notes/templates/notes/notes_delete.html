{% extends "base.html" %}
{% load static %}

{% block title %}Delete Note{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Delete Note</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted">Are you sure you want to delete this note?</p>
                    <div class="alert alert-warning" role="alert">
                        <strong>Warning:</strong> This action cannot be undone.
                    </div>
                    <div class="note-preview mb-4 p-3 bg-light rounded">
                        <h5>{{ object.title }}</h5>
                        <p class="text-muted small">Created: {{ object.created_at }}</p>
                    </div>
                    <form method="post" class="d-flex gap-2">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Delete Note
                        </button>
                        <a href="{% url 'notes.delete' pk=object.pk %}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
