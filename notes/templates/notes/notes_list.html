{% extends "base.html" %}
{% load static %}

{% block content %}

<h1 class="my-5">These are the notes</h1>
<div class="mb-3"></div>
    <div class="note-list"></div>
<ul>
    {% for note in notes %}
        <li class="note-item">
            {{ note.title }} - {{ note.content }}
        </li>
    {% endfor %}
</ul>
{% endblock %}
